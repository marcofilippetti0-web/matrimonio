<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Marco & Martina</title>

  <!-- FONT ELEGANTE -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, sans-serif;
      overflow-x:hidden;
      color:white;
      background:black;
    }

    /* SFONDO */
    .background{
      position:fixed;
      inset:0;
      background-image:url('images/foto.jpg');
      background-size:cover;
      background-position:center;
      transform:scale(1.05);
      animation:zoomBg 18s ease-in-out infinite alternate;
      z-index:-3;
    }

    @keyframes zoomBg{
      from{
        transform:scale(1.05);
      }
      to{
        transform:scale(1.15);
      }
    }

    /* OVERLAY */
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.45);
      z-index:-2;
    }

    /* INTRO */
    .intro{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;

      animation:fadeIn 2s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    h1{
      font-size:72px;
      font-weight:300;
      letter-spacing:4px;
      margin-bottom:20px;
      text-shadow:0 4px 20px rgba(0,0,0,.4);
    }

    .date{
      font-size:22px;
      letter-spacing:2px;
      margin-bottom:20px;
    }

    .subtitle{
      max-width:700px;
      line-height:1.8;
      font-size:18px;
      opacity:.95;
    }

    .scroll{
      margin-top:60px;
      font-size:14px;
      letter-spacing:3px;
      opacity:.8;
      animation:bounce 2s infinite;
    }

    @keyframes bounce{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(8px);
      }
    }

    /* CONTENUTO */
    .section{
      padding:80px 20px;
      display:flex;
      justify-content:center;
    }

    .card{
      width:100%;
      max-width:700px;
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:28px;
      padding:40px;
      box-shadow:0 10px 40px rgba(0,0,0,.25);
    }

    .card h2{
      text-align:center;
      margin-bottom:30px;
      font-size:34px;
      font-weight:300;
    }

    label{
      display:block;
      margin-top:20px;
      margin-bottom:8px;
      font-size:15px;
    }

    input,
    select,
    textarea{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      font-size:15px;
      outline:none;
      background:rgba(255,255,255,.9);
      color:#333;
    }

    textarea{
      min-height:100px;
      resize:vertical;
    }

    button{
      width:100%;
      margin-top:30px;
      padding:16px;
      border:none;
      border-radius:999px;
      background:white;
      color:#222;
      font-size:16px;
      cursor:pointer;
      transition:.3s;
      font-weight:bold;
    }

    button:hover{
      transform:translateY(-2px);
      background:#f3f3f3;
    }

    .hidden{
      display:none;
    }

    .footer{
      text-align:center;
      padding:40px 20px 80px;
      opacity:.85;
      font-size:14px;
    }

    @media(max-width:768px){

      h1{
        font-size:48px;
      }

      .card{
        padding:28px;
      }

    }
  </style>
</head>

<body>

  <!-- SFONDO -->
  <div class="background"></div>
  <div class="overlay"></div>

  <!-- HERO -->
  <section class="intro">

    <h1>Marco & Martina</h1>

    <div class="date">
      12 Settembre 2026
    </div>

    <p class="subtitle">
      Con grande gioia vi invitiamo a condividere con noi
      il giorno più bello della nostra vita.
    </p>

    <div class="scroll">
      SCORRI
    </div>

  </section>

  <!-- RSVP -->
  <section class="section">

    <div class="card">

      <h2>Conferma Partecipazione</h2>

      <form action="https://formspree.io/f/mwvaovek" method="POST">

        <!-- Redirect -->
        <input
          type="hidden"
          name="_next"
          value="https://marcofilippetti0-web.github.io/matrimonio/grazie.html"
        >

        <label>Nome e Cognome</label>
        <input type="text" name="nome" required>

        <label>Parteciperai?</label>

        <select
          name="presenza"
          id="presenza"
          onchange="toggleGuests()"
          required
        >
          <option value="">Seleziona</option>
          <option value="si">Sì</option>
          <option value="no">No</option>
        </select>

        <div id="guestSection" class="hidden">

          <label>Quanti sarete?</label>
          <input
            type="number"
            name="numero_persone"
            min="1"
          >

          <label>Allergie o intolleranze?</label>

          <select
            name="allergie"
            id="allergie"
            onchange="toggleAllergies()"
          >
            <option value="no">No</option>
            <option value="si">Sì</option>
          </select>

          <div id="allergyDetails" class="hidden">

            <label>Specifica eventuali allergie/intolleranze</label>

            <textarea
              name="dettagli_allergie"
            ></textarea>

          </div>

        </div>

        <button type="submit">
          Invia Conferma
        </button>

      </form>

    </div>

  </section>

  <!-- FOOTER -->
  <div class="footer">
    Marco & Martina ❤️
  </div>

  <script>

    function toggleGuests(){

      const presenza =
        document.getElementById('presenza').value;

      document.getElementById('guestSection').style.display =
        presenza === 'si'
        ? 'block'
        : 'none';
    }

    function toggleAllergies(){

      const allergie =
        document.getElementById('allergie').value;

      document.getElementById('allergyDetails').style.display =
        allergie === 'si'
        ? 'block'
        : 'none';
    }

  </script>

</body>
</html>
