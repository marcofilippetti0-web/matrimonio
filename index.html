<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Partecipazione Matrimonio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #3d2f2a;
    }

    .background {
      position: fixed;
      width: 100%;
      height: 100%;
      background-image: url('images/foto.jpg');
      background-size: cover;
      background-position: center;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.7);
      z-index: -1;
    }

    .wrap {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      margin-bottom: 20px;
    }

    .hero {
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #5f504a;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      border-radius: 999px;
      border: none;
      background: #3d2f2a;
      color: white;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="wrap">

  <section class="card hero">
    <h1>Luca & Giulia</h1>
    <p class="subtitle">Sabato 12 Settembre 2026 · Villa delle Rose</p>
    <p>Non vediamo l’ora di festeggiare con voi ❤️</p>
  </section>

  <section class="card">
    <h2>Conferma partecipazione</h2>

    <form action="https://formspree.io/f/mwvaovek" method="POST">

      <!-- redirect corretto -->
      <input type="hidden" name="_next" value="https://marcofilippetti0-web.github.io/matrimonio/grazie.html">

      <label>Nome e cognome</label>
      <input type="text" name="nome" required>

      <label>Parteciperai?</label>
      <select name="presenza" id="presenza" onchange="toggleGuests()" required>
        <option value="">Seleziona</option>
        <option value="si">Sì</option>
        <option value="no">No</option>
      </select>

      <div id="guestSection" class="hidden">
        <label>Quanti sarete?</label>
        <input type="number" name="numero_persone" min="1">

        <label>Allergie o intolleranze?</label>
        <select name="allergie" id="allergie" onchange="toggleAllergies()">
          <option value="no">No</option>
          <option value="si">Sì</option>
        </select>

        <div id="allergyDetails" class="hidden">
          <label>Specifica allergie</label>
          <textarea name="dettagli_allergie"></textarea>
        </div>
      </div>

      <button type="submit">Invia conferma</button>

    </form>
  </section>

</div>

<script>
function toggleGuests() {
  document.getElementById('guestSection').style.display =
    document.getElementById('presenza').value === 'si' ? 'block' : 'none';
}

function toggleAllergies() {
  document.getElementById('allergyDetails').style.display =
    document.getElementById('allergie').value === 'si' ? 'block' : 'none';
}
</script>

</body>
</html>
