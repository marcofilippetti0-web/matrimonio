<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marco & Martina</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family: Arial, sans-serif;
      background:#000;
      color:white;
      overflow-x:hidden;
    }

    /* SFONDO */
    .background{
      position:fixed;
      inset:0;
      background-image:url('images/foto.jpg');
      background-size:cover;
      background-position:center calc(50% - 1cm);
      z-index:-3;
      transform:scale(1.05);
      animation:zoom 18s ease-in-out infinite alternate;
    }

    @keyframes zoom{
      from{
        transform:scale(1.05);
      }
      to{
        transform:scale(1.12);
      }
    }

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      z-index:-2;
    }

    /* WRAPPER */
    .wrapper{
      width:100%;
    }

    /* SCHERMATE */
    .panel{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 20px;
    }

    .glass{
      width:100%;
      max-width:1100px;
      background:rgba(255,255,255,.12);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.15);
      border-radius:30px;
      padding:50px;
      box-shadow:0 10px 40px rgba(0,0,0,.25);
    }

    /* HERO */
    .hero{
      text-align:center;
      animation:fadeIn 2s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    h1{
      font-size:82px;
</html>
