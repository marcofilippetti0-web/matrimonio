<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Grazie ❤️</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      font-family:Arial, sans-serif;
      color:white;
      overflow:hidden;
    }

    /* FOTO SFONDO */
    .background{
      position:fixed;
      inset:0;
      background-image:url('images/foto.jpg');
      background-size:cover;
      background-position:center calc(50% - 1cm);
      z-index:-3;
      transform:scale(1.05);
      animation:zoomBg 15s ease-in-out infinite alternate;
    }

    @keyframes zoomBg{
      from{
        transform:scale(1.05);
      }
      to{
        transform:scale(1.12);
      }
    }

    /* OVERLAY */
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      z-index:-2;
    }

    /* CARD */
    .box{
      background:rgba(255,255,255,.12);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.15);
      border-radius:30px;
      padding:50px;
      max-width:700px;
      width:90%;
      animation:fadeIn 1.5s ease;
      box-shadow:0 10px 40px rgba(0,0,0,.25);
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    h1{
      font-size:58px;
      font-weight:300;
      margin-bottom:20px;
    }

    p{
      font-size:20px;
      line-height:1.8;
      opacity:.95;
    }

    .countdown{
      margin-top:25px;
      font-size:16px;
      opacity:.8;
    }

    a{
      display:inline-block;
      margin-top:40px;
      text-decoration:none;
      background:white;
      color:#222;
      padding:14px 28px;
      border-radius:999px;
      font-weight:bold;
      transition:.3s;
    }

    a:hover{
      transform:translateY(-2px);
      background:#f3f3f3;
    }

    @media(max-width:768px){

      h1{
        font-size:42px;
      }

      .box{
        padding:35px 25px;
      }

      p{
        font-size:18px;
      }

    }

  </style>
</head>

<body>

  <!-- SFONDO -->
  <div class="background"></div>
  <div class="overlay"></div>

  <!-- CONTENUTO -->
  <div class="box">

    <h1>Grazie ❤️</h1>

    <p>
      La vostra conferma è stata ricevuta.<br><br>
      Non vediamo l’ora di festeggiare insieme a voi.
    </p>

    <div class="countdown">
      Verrete reindirizzati automaticamente tra 10 secondi...
    </div>

    <a href="index.html">
      Torna subito al sito
    </a>

  </div>

  <!-- REDIRECT AUTOMATICO -->
  <script>

    setTimeout(function(){

      window.location.href =
        "https://marcofilippetti0-web.github.io/matrimonio/";

    }, 10000);

  </script>

</body>
</html>
